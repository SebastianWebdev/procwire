name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Lint job - runs first, fast feedback
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        # NOTE: must be `prettier --check` (format:check). `pnpm format --check`
        # expanded to `prettier -w . --check`, which REWRITES files and exits 0,
        # so formatting could never fail CI.
        run: pnpm format:check

  # ============================================
  # Build & Test - Node.js packages, all platforms
  # ============================================
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # Excludes:
    # - astro-docs: documentation site
    # - @procwire/bench, procwire-dashboard: benchmarks (run manually, CI runners too slow)
    # - @procwire/bun-core, @procwire/bun-client: tested in dedicated bun job
    # - ".": root package (its test script bypasses our filters)
    env:
      PNPM_FILTER: --filter "!astro-docs" --filter "!@procwire/bench" --filter "!procwire-dashboard" --filter "!@procwire/bun-core" --filter "!@procwire/bun-client" --filter "!."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm ${{ env.PNPM_FILTER }} build

      - name: Typecheck
        run: pnpm ${{ env.PNPM_FILTER }} --if-present typecheck

      - name: Run tests
        run: pnpm ${{ env.PNPM_FILTER }} --if-present test:ci

      # Upload build artifacts for potential reuse
      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
          retention-days: 1

  # ============================================
  # Bun packages - ubuntu only
  # ============================================
  bun-test:
    name: Bun Packages
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # "^..." selects all workspace dependencies of the Bun packages
      # (protocol, codecs, runtime-core) without listing them by hand.
      - name: Build dependencies
        run: pnpm --filter "@procwire/bun-core^..." --filter "@procwire/bun-client^..." build

      - name: Build Bun packages
        run: pnpm --filter "@procwire/bun-core" --filter "@procwire/bun-client" build

      # The cross-runtime E2E pairs spawn the OTHER runtime's packages.
      - name: Build Node packages (cross-runtime E2E)
        run: pnpm --filter "@procwire/core" --filter "@procwire/client" build

      - name: Typecheck Bun packages
        run: pnpm --filter "@procwire/bun-core" --filter "@procwire/bun-client" --if-present typecheck

      # Includes Bun parent <-> Node child (test/cross-runtime.test.ts).
      - name: Test Bun packages
        run: pnpm --filter "@procwire/bun-core" --filter "@procwire/bun-client" --if-present test

      # Node parent <-> Bun child runs under vitest in @procwire/core; this is
      # the only job with both runtimes installed (the OS matrix skips it).
      - name: Cross-runtime E2E (Node parent, Bun child)
        run: pnpm --filter "@procwire/core" exec vitest run test/cross-runtime.test.ts

  # ============================================
  # Workspace tooling - dashboard, bench, docs site
  # Previously had ZERO CI coverage despite real test suites.
  # ============================================
  aux-checks:
    name: Dashboard, Bench & Docs
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install D2 (diagrams for the docs site)
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # bench/dashboard typecheck against the libraries' dist output
      - name: Build library packages
        run: pnpm --filter "@procwire/*" --if-present build

      # Must run where ALL six publishables have dist/ - the build-and-test
      # job excludes the bun packages (they build in the bun job), so the
      # tarball check would false-fail there.
      - name: Check publish artifacts (LICENSE, dist entrypoints, dependency ranges)
        run: node scripts/check-publish-artifacts.mjs

      - name: Typecheck bench
        run: pnpm --filter "@procwire/bench" --if-present typecheck

      - name: Typecheck dashboard
        run: pnpm --filter "procwire-dashboard" --filter "procwire-dashboard-client" --if-present typecheck

      - name: Test dashboard
        run: pnpm --filter "procwire-dashboard" --if-present test

      - name: Build dashboard
        run: pnpm --filter "procwire-dashboard" --filter "procwire-dashboard-client" --if-present build

      - name: Build docs site
        run: pnpm --filter "astro-docs" --if-present build

  # ============================================
  # Final status check - for branch protection
  # ============================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, build-and-test, bun-test, aux-checks]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.build-and-test.result }}" != "success" ]] || \
             [[ "${{ needs.bun-test.result }}" != "success" ]] || \
             [[ "${{ needs.aux-checks.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
