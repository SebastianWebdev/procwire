name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Lint job - runs first, fast feedback
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format --check

  # ============================================
  # Build & Test - Node.js packages, all platforms
  # ============================================
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # Excludes:
    # - astro-docs: documentation site
    # - @procwire/bench, procwire-dashboard: benchmarks (run manually, CI runners too slow)
    # - @procwire/bun-core, @procwire/bun-client: tested in dedicated bun job
    # - ".": root package (its test script bypasses our filters)
    env:
      PNPM_FILTER: --filter "!astro-docs" --filter "!@procwire/bench" --filter "!procwire-dashboard" --filter "!@procwire/bun-core" --filter "!@procwire/bun-client" --filter "!."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm ${{ env.PNPM_FILTER }} build

      - name: Typecheck
        run: pnpm ${{ env.PNPM_FILTER }} --if-present typecheck

      - name: Run tests
        run: pnpm ${{ env.PNPM_FILTER }} --if-present test:ci

      # Upload build artifacts for potential reuse
      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
          retention-days: 1

  # ============================================
  # Bun packages - ubuntu only
  # ============================================
  bun-test:
    name: Bun Packages
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Bun packages depend on protocol + codecs, build those first
      - name: Build dependencies
        run: pnpm --filter "@procwire/protocol" --filter "@procwire/codecs" build

      - name: Build Bun packages
        run: pnpm --filter "@procwire/bun-core" --filter "@procwire/bun-client" build

      - name: Typecheck Bun packages
        run: pnpm --filter "@procwire/bun-core" --filter "@procwire/bun-client" --if-present typecheck

      - name: Test Bun packages
        run: pnpm --filter "@procwire/bun-core" --filter "@procwire/bun-client" --if-present test

  # ============================================
  # Final status check - for branch protection
  # ============================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, build-and-test, bun-test]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.build-and-test.result }}" != "success" ]] || \
             [[ "${{ needs.bun-test.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
